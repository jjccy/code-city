<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'unsafe-inline' {{cspSource}}; style-src 'unsafe-inline' {{cspSource}}; img-src {{cspSource}} data:;">
  <title>Code City</title>
  <link rel="stylesheet" href="{{styleUri}}">
  
</head>
<body>
  <!-- ── Full-screen pasture canvas ── -->
  <canvas id="pasture-canvas"></canvas>
  <div id="pasture-empty">No pets yet.<br>Hatch a pet to see them roam!</div>

  <!-- ── Floating resource bar (top) ── -->
  <div id="resources">
    <div class="res-chip">🌱 <span id="r-normal"  class="val">0</span></div>
    <div class="res-chip">⭐ <span id="r-premium" class="val">0</span></div>
    <div class="res-chip">🏙️ <span id="r-xp"      class="val">0</span> XP</div>
    <div class="res-chip">💎 <span id="r-rare"    class="val">0</span></div>
  </div>

  <!-- ── Open-drawer button ── -->
  <button id="drawer-btn" onclick="openDrawer()">☰ Menu</button>

  <!-- ── Bottom sheet drawer ── -->
  <div id="drawer">
    <div id="drawer-handle" onclick="closeDrawer()">
      <div class="handle-pill"></div>
    </div>

    <div id="tabs">
      <div class="tab active" data-tab="pets">🐾 Pets</div>
      <div class="tab"        data-tab="city">🏙️ City</div>
      <div class="tab"        data-tab="stats">📊 Stats</div>
      <div class="tab"        data-tab="dev" id="tab-dev">🔧 Dev</div>
    </div>

    <div id="drawer-content">
      <!-- PETS PANEL -->
      <div id="panel-pets" class="panel active">
        <div id="pet-top">
          <button class="primary" id="btn-add-pet" onclick="openHatch()">+ Hatch New Pet</button>
          <div id="hatch-cost-hint" style="font-size:10px;color:var(--muted);text-align:center"></div>

          <div id="hatch-form" style="display:none">
            <div id="hatch-species">
              <div class="section-title">Choose species</div>
              <div id="species-options"></div>
              <button onclick="closeHatch()" style="width:100%;margin-top:2px">✕ Cancel</button>
            </div>
            <div id="hatch-name" style="display:none">
              <div class="section-title">Name your pet</div>
              <div id="hatch-name-row">
                <span id="hatch-preview-emoji" style="font-size:20px"></span>
                <input id="pet-name-input" type="text" placeholder="Enter name…"
                       onkeydown="if(event.key==='Enter')confirmHatch()">
                <button class="primary" onclick="confirmHatch()">Hatch!</button>
                <button onclick="backToSpecies()" title="Back">←</button>
              </div>
            </div>
          </div>
        </div>
        <div id="pet-list"></div>
      </div>

      <!-- CITY PANEL -->
      <div id="panel-city" class="panel">
        <div id="city-bonuses" style="font-size:10px;color:var(--yellow);padding:2px 0"></div>
        <div class="section-title">🏗️ Your Buildings</div>
        <div id="building-list"></div>
        <div class="section-title" style="margin-top:8px">🔨 Build</div>
        <div id="build-options" class="build-grid"></div>
      </div>

      <!-- STATS PANEL -->
      <div id="panel-stats" class="panel">
        <div id="stats-list"></div>
      </div>

      <!-- DEV PANEL -->
      <div id="panel-dev" class="panel">
        <div class="dev-section">Resources</div>
        <div class="dev-row">
          <label>🌱 Normal Feed</label>
          <input id="dev-normalFeed" type="number" min="0">
          <button onclick="devSet('normalFeed')">Set</button>
        </div>
        <div class="dev-row">
          <label>⭐ Premium Feed</label>
          <input id="dev-premiumFeed" type="number" min="0">
          <button onclick="devSet('premiumFeed')">Set</button>
        </div>
        <div class="dev-row">
          <label>🏙️ City XP</label>
          <input id="dev-cityXP" type="number" min="0">
          <button onclick="devSet('cityXP')">Set</button>
        </div>
        <div class="dev-row">
          <label>💎 Rare Mats</label>
          <input id="dev-rareMaterials" type="number" min="0" step="0.1">
          <button onclick="devSet('rareMaterials')">Set</button>
        </div>

        <div class="dev-section" style="margin-top:8px">Quick Add</div>
        <div class="dev-actions">
          <button onclick="devAdd('normalFeed', 100)">+100 🌱</button>
          <button onclick="devAdd('normalFeed', 1000)">+1000 🌱</button>
          <button onclick="devAdd('premiumFeed', 50)">+50 ⭐</button>
          <button onclick="devAdd('cityXP', 200)">+200 XP</button>
          <button onclick="devAdd('rareMaterials', 10)">+10 💎</button>
        </div>

        <div class="dev-section" style="margin-top:8px">Actions</div>
        <div class="dev-actions">
          <button onclick="devTick()">⏱️ Force Tick</button>
          <button onclick="devReset()" style="border-color:var(--red)">🗑️ Reset Save</button>
        </div>

        <div class="dev-section" style="margin-top:8px">Pets</div>
        <div id="dev-pet-list"></div>
      </div>
    </div><!-- #drawer-content -->
  </div><!-- #drawer -->

  <script src="{{uiUri}}"></script>
  <script src="{{pastureUri}}"></script>
  <script>
    const vscode = acquireVsCodeApi();
    let state = null;
    let hatchSpeciesId = null;

    // ── Drawer ───────────────────────────────────────────────────────────────
    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawer-btn').classList.add('hidden');
    }
    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawer-btn').classList.remove('hidden');
    }

    // ── Tabs ─────────────────────────────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      });
    });

    // ── State ────────────────────────────────────────────────────────────────
    window.addEventListener('message', e => {
      if (e.data.type === 'state') { state = e.data.data; render(); }
    });

    function render() {
      if (!state) { return; }
      renderResources();
      renderPets();
      renderCity();
      renderStats();
      syncPastureSprites();
      if (!pastureActive) { pastureActive = true; startPasture(); }
      const devTab = document.getElementById('tab-dev');
      devTab.style.display = state.devMode === false ? 'none' : '';
      if (state.devMode) { renderDev(); }
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    vscode.postMessage({ type: 'ready' });
  </script>
</body>
</html>
